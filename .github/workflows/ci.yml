name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test Tests/Server.Tests -c Release --no-build --verbosity minimal

  benchmark-regression:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Run BenchmarkDotNet (ShortRun)
        run: dotnet run --project Benchmarks -c Release -- --job short --filter '*' --exporters json

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            BenchmarkDotNet.Artifacts/results/*.json
            BenchmarkDotNet.Artifacts/results/*.md
          if-no-files-found: warn

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Server/Dockerfile
          push: false
          tags: aiming-server:ci

      - name: Build bots image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: BotClients/Dockerfile
          push: false
          tags: aiming-bots:ci
