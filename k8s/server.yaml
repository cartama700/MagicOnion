apiVersion: v1
kind: ConfigMap
metadata:
  name: server-config
  namespace: aiming-poc
data:
  ConnectionStrings__Mysql: "Server=mysql;Port=3306;Database=aiming;Uid=aiming;Pwd=aiming;"
  ConnectionStrings__Redis: "redis:6379"
  DOTNET_gcServer: "1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  namespace: aiming-poc
spec:
  replicas: 1
  selector:
    matchLabels: { app: server }
  template:
    metadata:
      labels: { app: server }
    spec:
      containers:
        - name: server
          image: REGISTRY/aiming-server:latest   # ← 빌드 후 태그 교체
          ports:
            - { name: http,   containerPort: 5050 }
            - { name: grpc,   containerPort: 5001 }
          envFrom:
            - configMapRef: { name: server-config }
          readinessProbe:
            httpGet: { path: /health/ready, port: 5050 }   # Phase 13 — drain 시 503 리턴
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 1
          livenessProbe:
            httpGet: { path: /health/live, port: 5050 }    # drain 중에도 green 유지
            initialDelaySeconds: 30
            periodSeconds: 15
          lifecycle:
            preStop:
              exec:
                # Phase 13 — LB 가 엔드포인트 제거 인식할 시간 확보 후 SIGTERM
                command: ["/bin/sh", "-c", "sleep 10"]
          resources:
            requests: { cpu: "200m", memory: "256Mi" }
            limits:   { cpu: "2",    memory: "1Gi" }
      terminationGracePeriodSeconds: 60   # Phase 13 — 드레인 25s + preStop 10s + 여유
---
apiVersion: v1
kind: Service
metadata:
  name: server
  namespace: aiming-poc
spec:
  type: ClusterIP
  selector: { app: server }
  ports:
    - { name: http, port: 5050, targetPort: 5050 }
    - { name: grpc, port: 5001, targetPort: 5001 }
---
# 외부 노출용 (GKE Ingress / GCLB)
apiVersion: v1
kind: Service
metadata:
  name: server-public
  namespace: aiming-poc
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
spec:
  type: LoadBalancer
  selector: { app: server }
  ports:
    - { name: http, port: 80,   targetPort: 5050 }
    - { name: grpc, port: 5001, targetPort: 5001 }
